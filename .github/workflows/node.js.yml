name: Deploy React to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Point this to one of your subdirectories that has a package-lock.json
          cache: 'npm'
          cache-dependency-path: './website-source/package-lock.json'

      - name: Validate Production Settings
        run: |
          if ! grep -Fq "debugMode = false" game-source/public/game/controllers/game/mlLabNarrator.js; then
            echo "Error: debugMode is not set to false"
            exit 1
          fi
          if ! grep -q "^\s*this.transition('titleStage');" game-source/public/game/controllers/game/stateManager.js; then
            echo "Error: stateManager is not set to titleStage"
            exit 1
          fi

      - name: Install and Build Website
        working-directory: ./website-source
        run: | #Temporary solution. Change to npm ci
          npm install 
          npm run build

      - name: Install and Build Game
        working-directory: ./game-source
        run: |  #Temporary solution. Change to npm ci
          npm install
          npm run build

      # Crucial Step: Your script suggests you want everything in a root 'dist' folder
      - name: Prepare Final Dist
        run: |
          mkdir -p dist
          # Adjust these paths based on where your 'npm run build' actually outputs files
          cp -r website-source/dist/* dist/ || true
          cp -r game-source/dist/* dist/ || true

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist 

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
