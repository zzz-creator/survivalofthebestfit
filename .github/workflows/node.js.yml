name: Deploy React to GitHub Pages

on:
  push:
    branches: [main] # Adjusted from 'master' to 'main' to match your trigger
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Or your preferred version
          cache: 'npm'

      # --- LOGIC MATCHING: Pre-deployment checks ---
      - name: Validate Production Settings
        run: |
          if ! grep -Fq "debugMode = false" game-source/public/game/controllers/game/mlLabNarrator.js; then
            echo "Error: debugMode is not set to false in mlLabNarrator.js"
            exit 1
          fi
          if ! grep -q "^\s*this.transition('titleStage');" game-source/public/game/controllers/game/stateManager.js; then
            echo "Error: stateManager is not set to titleStage"
            exit 1
          fi

      # --- LOGIC MATCHING: Multi-project build ---
      - name: Build Website
        run: |
          cd website-source
          npm ci
          npm run build
          
      - name: Build Game
        run: |
          cd game-source
          npm ci
          npm run build

      # --- LOGIC MATCHING: Artifact Preparation ---
      # Your script suggests the final files live in a root /dist folder 
      # after both builds run. If they build into their own folders, 
      # you may need to move them into one place here.
      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist 

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
